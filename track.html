<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ติดตามออเดอร์ — picked&more</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans Thai', sans-serif;
      background: #FEFAF8;
      color: #402D21;
      padding-bottom: 100px;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #EAD9C8;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .back-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #402D21;
      padding: 4px;
      line-height: 1;
    }
    .header-title {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    .search-wrap {
      padding: 24px 20px 0;
    }
    .search-label {
      font-size: 13px;
      color: #7a6355;
      margin-bottom: 10px;
    }
    .search-row {
      display: flex;
      gap: 10px;
    }
    .search-input {
      flex: 1;
      padding: 13px 16px;
      border: 1.5px solid #EAD9C8;
      border-radius: 12px;
      font-family: 'Noto Sans Thai', sans-serif;
      font-size: 15px;
      background: #fff;
      color: #402D21;
      outline: none;
    }
    .search-input:focus { border-color: #B8957A; }
    .search-btn {
      padding: 13px 20px;
      background: #402D21;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Noto Sans Thai', sans-serif;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .search-btn:disabled { opacity: 0.5; }

    .results {
      padding: 20px 20px 0;
    }

    .empty-msg {
      text-align: center;
      padding: 60px 20px;
      color: #9a8878;
      font-size: 14px;
      line-height: 2;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* ─── ORDER CARD ─── */
    .order-card {
      background: #fff;
      border: 1px solid #EAD9C8;
      border-radius: 16px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .order-header {
      padding: 14px 16px;
      border-bottom: 1px solid #F5EDE4;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .order-id {
      font-size: 11px;
      color: #9a8878;
      margin-bottom: 3px;
    }
    .order-date {
      font-size: 13px;
      font-weight: 500;
    }
    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-pending_payment  { background: #FFF3CD; color: #856404; }
    .status-paid             { background: #D4EDDA; color: #155724; }
    .status-confirmed        { background: #D1ECF1; color: #0c5460; }
    .status-shipping         { background: #CCE5FF; color: #004085; }
    .status-delivered        { background: #D4EDDA; color: #155724; }
    .status-cancelled        { background: #F8D7DA; color: #721c24; }

    .order-items {
      padding: 12px 16px;
      border-bottom: 1px solid #F5EDE4;
    }
    .order-item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 4px 0;
      color: #5a4232;
    }
    .order-item-name { flex: 1; padding-right: 8px; }
    .order-item-price { color: #6C4D38; font-weight: 500; white-space: nowrap; }

    .order-footer {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .order-total {
      font-size: 15px;
      font-weight: 600;
      color: #402D21;
    }
    .order-total span {
      font-family: 'Josefin Sans', sans-serif;
    }
    .tracking-wrap {
      width: 100%;
      background: #F5EDE4;
      border-radius: 10px;
      padding: 10px 14px;
      margin-top: 4px;
    }
    .tracking-label {
      font-size: 11px;
      color: #7a6355;
      margin-bottom: 3px;
    }
    .tracking-number {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #402D21;
    }
    .tracking-copy {
      background: none;
      border: 1px solid #B8957A;
      color: #6C4D38;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      margin-top: 6px;
    }

    /* status label map */
    .status-label-pending_payment { }

    /* bottom nav */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 1px solid #EAD9C8;
      display: flex;
      z-index: 20;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 0 14px;
      text-decoration: none;
      color: #9a8878;
      font-size: 10px;
      gap: 3px;
      font-family: 'Noto Sans Thai', sans-serif;
    }
    .nav-item.active { color: #402D21; }
    .nav-item svg { width: 22px; height: 22px; }
  </style>
</head>
<body>

<header>
  <button class="back-btn" onclick="history.back()">←</button>
  <div class="header-title">PICKED&MORE</div>
</header>

<div class="search-wrap">
  <div class="search-label">กรอกเบอร์โทรที่ใช้สั่งซื้อ</div>
  <div class="search-row">
    <input class="search-input" id="phoneInput" type="tel" placeholder="0812345678"
      onkeydown="if(event.key==='Enter') searchOrders()" />
    <button class="search-btn" id="searchBtn" onclick="searchOrders()">ค้นหา</button>
  </div>
</div>

<div class="results" id="results">
  <div class="empty-msg">
    <div class="empty-icon">📦</div>
    กรอกเบอร์โทรเพื่อดูออเดอร์ของคุณ
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
    </svg>
    หน้าหลัก
  </a>
  <a href="order.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.95-1.57L23 6H6"/>
    </svg>
    ตะกร้า
  </a>
  <a href="track.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/>
      <circle cx="12" cy="10" r="3"/>
    </svg>
    ติดตามออเดอร์
  </a>
</nav>

<script>
  const STATUS_TH = {
    pending_payment: '⏳ รอชำระเงิน',
    paid:            '✅ ชำระแล้ว',
    confirmed:       '✔️ ยืนยันแล้ว',
    shipping:        '✈️ อยู่ระหว่างส่ง',
    delivered:       '📬 ส่งถึงแล้ว',
    cancelled:       '❌ ยกเลิก',
  };

  async function searchOrders() {
    const phone = document.getElementById('phoneInput').value.trim();
    if (!phone) return;
    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.textContent = 'กำลังค้นหา...';

    const { data: orders, error } = await db
      .from('orders')
      .select('*, order_items(*)')
      .eq('customer_phone', phone)
      .order('created_at', { ascending: false });

    btn.disabled = false;
    btn.textContent = 'ค้นหา';

    const el = document.getElementById('results');
    if (error || !orders || !orders.length) {
      el.innerHTML = '<div class="empty-msg"><div class="empty-icon">🔍</div>ไม่พบออเดอร์จากเบอร์นี้<br>กรุณาตรวจสอบเบอร์โทรอีกครั้ง</div>';
      return;
    }

    el.innerHTML = orders.map(function(o) {
      const date = new Date(o.created_at).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
      const statusKey = o.status || 'pending_payment';
      const statusTh = STATUS_TH[statusKey] || statusKey;
      const idShort = o.id.slice(0, 8).toUpperCase();

      const itemsHtml = (o.order_items || []).map(function(it) {
        return '<div class="order-item">'
          + '<div class="order-item-name">' + it.product_name + (it.notes ? ' <span style="color:#9a8878;font-size:12px">(' + it.notes + ')</span>' : '') + ' × ' + it.quantity + '</div>'
          + '<div class="order-item-price">฿ ' + Number(it.price_thb * it.quantity).toLocaleString() + '</div>'
          + '</div>';
      }).join('');

      const trackingHtml = o.tracking_number
        ? '<div class="tracking-wrap">'
          + '<div class="tracking-label">เลขพัสดุ</div>'
          + '<div class="tracking-number">' + o.tracking_number + '</div>'
          + '<button class="tracking-copy" onclick="copyTracking(\'' + o.tracking_number + '\')">คัดลอก</button>'
          + '</div>'
        : '';

      const shippingRow = o.shipping_fee > 0
        ? '<div class="order-item" style="color:#9a8878"><div class="order-item-name">ค่าจัดส่ง</div><div class="order-item-price">฿ ' + o.shipping_fee + '</div></div>'
        : '';

      return '<div class="order-card">'
        + '<div class="order-header">'
        + '<div><div class="order-id">#' + idShort + '</div><div class="order-date">' + date + '</div></div>'
        + '<span class="status-badge status-' + statusKey + '">' + statusTh + '</span>'
        + '</div>'
        + '<div class="order-items">' + itemsHtml + shippingRow + '</div>'
        + '<div class="order-footer">'
        + '<div class="order-total">รวม <span>฿ ' + Number(o.total_price).toLocaleString() + '</span></div>'
        + trackingHtml
        + '</div>'
        + '</div>';
    }).join('');
  }

  function copyTracking(num) {
    navigator.clipboard.writeText(num).then(function() {
      alert('คัดลอกเลขพัสดุแล้ว: ' + num);
    });
  }
</script>
</body>
</html>
