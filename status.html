<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ติดตามออเดอร์ — picked&more</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans Thai', sans-serif;
      background: #FEFAF8;
      color: #402D21;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #EAD9C8;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .back-btn { font-size: 20px; text-decoration: none; color: #402D21; }
    .page-title { font-size: 16px; font-weight: 600; }

    .search-section {
      background: #fff;
      margin: 12px 16px;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #EAD9C8;
    }
    .search-section h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .search-section p {
      font-size: 13px;
      color: #9a8878;
      margin-bottom: 16px;
    }
    .search-row {
      display: flex;
      gap: 8px;
    }
    .search-row input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #ddd7d0;
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Noto Sans Thai', sans-serif;
      background: #FEFAF8;
      outline: none;
    }
    .search-row input:focus { border-color: #CFB59E; background: #fff; }
    .search-btn {
      padding: 12px 20px;
      background: #402D21;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Noto Sans Thai', sans-serif;
      cursor: pointer;
    }

    /* ORDER CARD */
    .order-card {
      background: #fff;
      margin: 12px 16px;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #EAD9C8;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .order-num { font-size: 20px; font-weight: 700; }
    .order-date { font-size: 12px; color: #aaa; margin-top: 2px; }
    .status-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    /* STATUS STEPS */
    .status-steps {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 20px;
    }
    .step {
      display: flex;
      gap: 14px;
      position: relative;
    }
    .step-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      z-index: 1;
    }
    .step-line {
      position: absolute;
      left: 13px;
      top: 28px;
      width: 2px;
      height: calc(100% + 4px);
      background: #EAD9C8;
    }
    .step:last-child .step-line { display: none; }
    .step-content { padding: 4px 0 20px; }
    .step-label { font-size: 14px; font-weight: 500; }
    .step-desc { font-size: 12px; color: #aaa; margin-top: 2px; }

    /* step states */
    .step.done .step-dot { background: #402D21; color: #fff; }
    .step.done .step-line { background: #402D21; }
    .step.current .step-dot { background: #CFB59E; color: #fff; }
    .step.pending .step-dot { background: #f0ebe4; color: #ccc; }

    /* ORDER ITEMS */
    .items-title {
      font-size: 13px;
      font-weight: 600;
      color: #9a8878;
      margin-bottom: 10px;
    }
    .item-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 8px 0;
      border-bottom: 1px solid #f0ebe4;
    }
    .item-row:last-child { border-bottom: none; }

    /* TRACKING */
    .tracking-box {
      background: #f0f7f0;
      border: 1px solid #c8e6c9;
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 16px;
    }
    .tracking-box .label { font-size: 12px; color: #4caf50; margin-bottom: 4px; }
    .tracking-box .number {
      font-size: 20px;
      font-weight: 700;
      color: #2e7d32;
      letter-spacing: 1px;
    }
    .tracking-box .carrier { font-size: 12px; color: #66bb6a; margin-top: 2px; }

    /* EMPTY / ERROR */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .loading-state {
      text-align: center;
      padding: 40px;
      color: #aaa;
      font-size: 14px;
    }

    /* FLIGHT STATUS BAR */
    .flight-status-bar {
      margin: 12px 16px 0;
      border-radius: 14px;
      border: 1px solid #EAD9C8;
      background: #fff;
      overflow: hidden;
      display: none;
    }
    .flight-status-bar.show { display: block; }
    .fsb-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px 10px;
      border-bottom: 1px solid #f0ebe4;
    }
    .fsb-flight-name {
      font-size: 13px;
      font-weight: 700;
      color: #402D21;
      flex: 1;
    }
    .fsb-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: #f0faf1;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
      font-family: 'Noto Sans Thai', sans-serif;
    }
    .fsb-steps {
      display: flex;
      padding: 14px 16px;
      gap: 0;
      position: relative;
    }
    .fsb-step {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }
    .fsb-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      margin-bottom: 6px;
      flex-shrink: 0;
    }
    .fsb-step.done .fsb-dot { background: #402D21; color: #fff; }
    .fsb-step.current .fsb-dot { background: #CFB59E; color: #fff; box-shadow: 0 0 0 3px #f5ede0; }
    .fsb-step.pending .fsb-dot { background: #f0ebe4; color: #ccc; }
    .fsb-step-label {
      font-size: 10px;
      text-align: center;
      line-height: 1.3;
      color: #9a8878;
      font-family: 'Noto Sans Thai', sans-serif;
    }
    .fsb-step.done .fsb-step-label,
    .fsb-step.current .fsb-step-label { color: #402D21; font-weight: 600; }
    .fsb-line {
      position: absolute;
      top: 13px;
      left: calc(50% + 13px);
      right: calc(-50% + 13px);
      height: 2px;
      background: #EAD9C8;
      z-index: 0;
    }
    .fsb-step.done .fsb-line { background: #402D21; }
    .fsb-note {
      font-size: 12px;
      color: #9a8878;
      padding: 0 16px 12px;
      text-align: center;
      font-family: 'Noto Sans Thai', sans-serif;
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">←</a>
  <div class="page-title">ติดตามออเดอร์</div>
</header>

<!-- FLIGHT STATUS BAR -->
<div class="flight-status-bar" id="flightStatusBar">
  <div class="fsb-header">
    <span>✈️</span>
    <div class="fsb-flight-name" id="fsbFlightName">รอบบินปัจจุบัน</div>
    <span class="fsb-badge" id="fsbBadge">เปิดรับออเดอร์</span>
  </div>
  <div class="fsb-steps" id="fsbSteps">
    <!-- generated by JS -->
  </div>
  <div class="fsb-note" id="fsbNote" style="display:none"></div>
</div>

<div class="search-section">
  <h2>ค้นหาออเดอร์</h2>
  <p>ใส่เบอร์โทร หรือ LINE ID ที่ใช้สั่ง</p>
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="เบอร์โทร หรือ LINE ID" />
    <button class="search-btn" onclick="searchOrders()">ค้นหา</button>
  </div>
</div>

<div id="results"></div>

<script src="config.js"></script>
<script>
  // ─── FLIGHT STATUS BAR ───
  const FLIGHT_STEPS = [
    { key: 'ordering', label: 'รับออเดอร์' },
    { key: 'buying',   label: 'ซื้อของ' },
    { key: 'transit',  label: 'ขนส่ง' },
    { key: 'arrived',  label: 'ถึงไทย' },
    { key: 'packing',  label: 'แพ็คของ' },
    { key: 'shipped',  label: 'ส่งแล้ว' },
  ];

  async function loadFlightStatus() {
    const { data: flights } = await db.from('flight_rounds')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(1);
    if (!flights || !flights.length) return;
    const f = flights[0];
    const bar = document.getElementById('flightStatusBar');
    document.getElementById('fsbFlightName').textContent = f.name || 'รอบบินปัจจุบัน';

    // badge
    const badge = document.getElementById('fsbBadge');
    if (f.status === 'open') { badge.textContent = 'เปิดรับออเดอร์'; badge.style.background='#f0faf1'; badge.style.color='#2e7d32'; badge.style.borderColor='#c8e6c9'; }
    else if (f.status === 'closed') { badge.textContent = 'ปิดรับออเดอร์'; badge.style.background='#fff3e0'; badge.style.color='#e65100'; badge.style.borderColor='#ffcc80'; }
    else { badge.textContent = 'เสร็จสิ้น'; badge.style.background='#f5f5f5'; badge.style.color='#888'; badge.style.borderColor='#ddd'; }

    // steps — use flight_step column if exists
    const currentStep = f.flight_step || 'ordering';
    const currentIdx = FLIGHT_STEPS.findIndex(function(s){ return s.key === currentStep; });
    const stepsEl = document.getElementById('fsbSteps');
    let html = '';
    FLIGHT_STEPS.forEach(function(s, i) {
      let cls = i < currentIdx ? 'done' : i === currentIdx ? 'current' : 'pending';
      let icon = i < currentIdx ? '✓' : i === currentIdx ? '●' : (i+1).toString();
      let lineHtml = i < FLIGHT_STEPS.length - 1 ? '<div class="fsb-line"></div>' : '';
      html += '<div class="fsb-step ' + cls + '">';
      html += '<div class="fsb-dot">' + icon + '</div>';
      html += lineHtml;
      html += '<div class="fsb-step-label">' + s.label + '</div>';
      html += '</div>';
    });
    stepsEl.innerHTML = html;

    // note
    if (f.update_text) {
      const noteEl = document.getElementById('fsbNote');
      noteEl.textContent = '💬 ' + f.update_text;
      noteEl.style.display = 'block';
    }

    bar.classList.add('show');
  }

  loadFlightStatus();

  const STATUS_CONFIG = {
    pending_payment: { label: 'รอโอนเงิน',       icon: '💳', color: '#fff3e0', text: '#e65100' },
    paid:            { label: 'รอตรวจสลิป',      icon: '🔍', color: '#e3f2fd', text: '#1565c0' },
    confirmed:       { label: 'ยืนยันแล้ว',      icon: '✅', color: '#e8f5e9', text: '#2e7d32' },
    in_transit:      { label: 'กำลังหิ้วกลับ',   icon: '✈️', color: '#fce4ec', text: '#880e4f' },
    shipped:         { label: 'จัดส่งแล้ว',       icon: '📦', color: '#f3e5f5', text: '#6a1b9a' },
    delivered:       { label: 'ได้รับแล้ว',       icon: '🎉', color: '#e8f5e9', text: '#1b5e20' },
    cancelled:       { label: 'ยกเลิก',           icon: '❌', color: '#fce4ec', text: '#b71c1c' },
  };

  const STEPS = [
    { key: 'pending_payment', label: 'รอโอนเงิน',     desc: 'รอสลิปโอนเงิน' },
    { key: 'paid',            label: 'ตรวจสลิป',      desc: 'กำลังตรวจสอบการโอน' },
    { key: 'confirmed',       label: 'ยืนยันออเดอร์', desc: 'ออเดอร์ถูกยืนยันแล้ว' },
    { key: 'in_transit',      label: 'กำลังหิ้ว',     desc: 'อยู่ระหว่างนำกลับจากญี่ปุ่น' },
    { key: 'shipped',         label: 'จัดส่งแล้ว',    desc: 'อยู่ระหว่างจัดส่ง' },
    { key: 'delivered',       label: 'ได้รับสินค้า',  desc: 'ส่งถึงมือแล้ว' },
  ];

  function stepState(orderStatus, stepKey) {
    const order = STEPS.map(s => s.key);
    const orderIdx = order.indexOf(orderStatus);
    const stepIdx = order.indexOf(stepKey);
    if (stepIdx < orderIdx) return 'done';
    if (stepIdx === orderIdx) return 'current';
    return 'pending';
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    return new Date(dateStr).toLocaleDateString('th-TH', {
      day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
    });
  }

  async function searchOrders() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;

    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '<div class="loading-state">กำลังค้นหา...</div>';

    // ค้นหาด้วยเบอร์โทรหรือ LINE
    const { data, error } = await db
      .from('orders')
      .select(`*, order_items(*), tracking(*), slips(*)`)
      .or(`customer_phone.eq.${query},customer_line.eq.${query}`)
      .order('created_at', { ascending: false });

    if (error || !data || !data.length) {
      resultsDiv.innerHTML = `
        <div class="empty-state">
          <div class="icon">🔍</div>
          <p>ไม่พบออเดอร์<br/>ลองใช้เบอร์โทรหรือ LINE ID ที่ใช้สั่งนะคะ</p>
        </div>`;
      return;
    }

    resultsDiv.innerHTML = data.map(order => renderOrderCard(order)).join('');
  }

  function renderOrderCard(order) {
    const cfg = STATUS_CONFIG[order.status] || STATUS_CONFIG.pending_payment;
    const steps = order.status !== 'cancelled'
      ? STEPS.map(step => {
          const state = stepState(order.status, step.key);
          return `
            <div class="step ${state}">
              <div class="step-dot">${state === 'done' ? '✓' : state === 'current' ? cfg.icon : '○'}</div>
              <div class="step-line"></div>
              <div class="step-content">
                <div class="step-label">${step.label}</div>
                <div class="step-desc">${state === 'current' ? step.desc : ''}</div>
              </div>
            </div>`;
        }).join('')
      : `<div style="text-align:center;color:#e57373;padding:10px">ออเดอร์นี้ถูกยกเลิก</div>`;

    const items = (order.order_items || []).map(item =>
      `<div class="item-row">
        <span>${item.product_name} × ${item.quantity}</span>
        <span>฿${(item.price_thb * item.quantity).toLocaleString()}</span>
      </div>`
    ).join('');

    const tracking = order.tracking && order.tracking.length
      ? `<div class="tracking-box">
           <div class="label">📦 เลขพัสดุ</div>
           <div class="number">${order.tracking[0].tracking_number}</div>
           <div class="carrier">${order.tracking[0].carrier}</div>
         </div>`
      : '';

    return `
      <div class="order-card">
        <div class="order-header">
          <div>
            <div class="order-num">#${String(order.order_number).padStart(3,'0')}</div>
            <div class="order-date">${formatDate(order.created_at)}</div>
          </div>
          <div class="status-badge" style="background:${cfg.color};color:${cfg.text}">
            ${cfg.icon} ${cfg.label}
          </div>
        </div>

        <div class="status-steps">${steps}</div>

        <div class="items-title">รายการสินค้า</div>
        ${items}
        <div class="item-row" style="font-weight:700;color:#6C4D38">
          <span>รวม</span>
          <span>฿${Number(order.total_price).toLocaleString()}</span>
        </div>

        ${tracking}
      </div>`;
  }

  // ค้นหาอัตโนมัติถ้ามีเบอร์เก็บไว้
  const savedPhone = localStorage.getItem('pam_phone');
  if (savedPhone) {
    document.getElementById('searchInput').value = savedPhone;
    searchOrders();
  }

  // กด Enter ได้
  document.getElementById('searchInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') searchOrders();
  });
</script>
<style>
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #EAD9C8;display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,0px)}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;text-decoration:none;color:#bbb;font-size:10px;gap:3px;font-family:'Noto Sans Thai',sans-serif;transition:color .15s}
.bottom-nav-item.active{color:#402D21}
.bottom-nav-item .nav-icon{font-size:20px;line-height:1}
</style>
<nav class="bottom-nav">
<a href="index.html" class="bottom-nav-item"><span class="nav-icon">🏠</span><span>หน้าหลัก</span></a>
<a href="order.html" class="bottom-nav-item"><span class="nav-icon">🛒</span><span>สั่งซื้อ</span></a>
<a href="status.html" class="bottom-nav-item active"><span class="nav-icon">📦</span><span>ติดตามออเดอร์</span></a>
</nav>
</body>
</html>
